<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NLE Studio</title>
  <link rel="stylesheet" href="./styles/main.css" />
  <link rel="stylesheet" href="./styles/components.css" />
</head>
<body>

<div id="app">

  <!-- ── Top row ─────────────────────────────────────────────────────── -->
  <div id="top-row">

    <!-- Source Monitor (top-left) -->
    <div id="source-monitor" class="panel">
      <div class="panel-header">
        <span class="panel-title">Source</span>
        <span class="panel-badge" id="source-clip-name"></span>
      </div>
      <div class="monitor-viewport">
        <canvas id="source-canvas"></canvas>
        <div class="monitor-empty" id="source-empty">
          <p>No clip loaded</p>
          <p class="hint">Double-click a clip in the Media Bin</p>
        </div>
      </div>
      <div class="monitor-transport">
        <div class="transport-timecode">
          <span id="source-timecode">00:00:00:00</span>
          <span class="transport-sep">/</span>
          <span id="source-dur">00:00:00:00</span>
        </div>
        <div class="transport-controls">
          <button class="btn-icon" id="source-btn-mark-in"   title="Mark In (I)"           disabled>⌙</button>
          <button class="btn-icon" id="source-btn-step-back" title="Step Back (←)"          disabled>◁</button>
          <button class="btn-icon btn-play" id="source-btn-play" title="Play/Pause (Space)" disabled>▶</button>
          <button class="btn-icon" id="source-btn-step-fwd"  title="Step Forward (→)"       disabled>▷</button>
          <button class="btn-icon" id="source-btn-mark-out"  title="Mark Out (O)"           disabled>⌜</button>
        </div>
        <div class="transport-io">
          <button class="btn-sm" id="source-btn-insert"    disabled>Insert</button>
          <button class="btn-sm" id="source-btn-overwrite" disabled>Overwrite</button>
        </div>
      </div>
    </div>

    <!-- Vertical divider -->
    <div class="divider-v" id="divider-col"></div>

    <!-- Program Monitor (top-right) -->
    <div id="program-monitor" class="panel">
      <div class="panel-header">
        <span class="panel-title">Program</span>
        <span class="panel-badge" id="program-seq-name"></span>
      </div>
      <div class="monitor-viewport">
        <canvas id="gl-canvas"></canvas>
        <div class="monitor-empty" id="program-empty">
          <p>No sequence — add clips to the timeline</p>
        </div>
        <div class="loading-overlay" id="loading-overlay">
          <span id="loading-text">Loading…</span>
        </div>
      </div>
      <div class="monitor-transport">
        <div class="transport-timecode">
          <span id="timecode">00:00:00:00</span>
          <span class="transport-sep">/</span>
          <span id="duration-display">00:00:00:00</span>
        </div>
        <div class="transport-controls">
          <button class="btn-icon" id="btn-step-back"  title="Step Back (←)"          disabled>◁</button>
          <button class="btn-icon btn-play" id="btn-play-pause" title="Play/Pause (Space)" disabled>▶</button>
          <button class="btn-icon" id="btn-step-fwd"   title="Step Forward (→)"        disabled>▷</button>
        </div>
      </div>
    </div>

  </div><!-- /top-row -->

  <!-- Horizontal divider -->
  <div class="divider-h" id="divider-row"></div>

  <!-- ── Bottom row ──────────────────────────────────────────────────── -->
  <div id="bottom-row">

    <!-- Media Bin (bottom-left) -->
    <div id="media-bin" class="panel">
      <div class="panel-header">
        <span class="panel-title">Media Bin</span>
        <div class="panel-actions">
          <button class="btn-sm" id="btn-import">Import…</button>
          <button class="btn-sm" id="btn-save-project"  title="Save project (⌘S)">Save</button>
          <button class="btn-sm" id="btn-load-project"  title="Load project">Load</button>
        </div>
      </div>

      <!-- Drop overlay (shown while dragging files over the bin) -->
      <div id="bin-drop-overlay" style="display:none;position:absolute;inset:0;background:rgba(79,143,255,.12);border:2px dashed var(--accent);border-radius:4px;pointer-events:none;z-index:5;align-items:center;justify-content:center;color:var(--accent);font-size:13px;">
        Drop to import
      </div>

      <div id="media-bin-list" class="bin-list">
        <div class="bin-empty" id="bin-empty-msg">
          <p>No media imported</p>
          <p class="hint">Click Import or drag files here</p>
        </div>
      </div>

      <div id="status" class="status-bar">Waiting for WASM…</div>
    </div>

    <!-- Second vertical divider (same --col-w, keeps columns aligned) -->
    <div class="divider-v" id="divider-col-2"></div>

    <!-- Timeline (bottom-right) -->
    <div id="timeline-panel" class="panel">
      <div class="panel-header">
        <span class="panel-title">Timeline</span>
        <div class="panel-actions">
          <button class="btn-icon tool-btn active" id="tool-select" title="Select (V)">↖</button>
          <button class="btn-icon tool-btn"        id="tool-razor"  title="Razor (C)">✂</button>
          <button class="btn-icon tool-btn"        id="tool-hand"   title="Hand (H)">✋</button>
          <span class="divider-sm"></span>
          <span class="timecode-sm" id="timeline-timecode">00:00:00:00</span>
        </div>
      </div>
      <canvas id="timeline-canvas"></canvas>
    </div>

  </div><!-- /bottom-row -->

</div><!-- /app -->

<!-- Hidden file inputs -->
<input type="file" id="file-input-import" accept="video/*" multiple style="display:none" />

<script type="module" src="./main.js"></script>
</body>
</html>
